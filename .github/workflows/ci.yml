name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - name: Install PyQt6 runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libxkbcommon-x11-0 libdbus-1-3
      - run: uv sync
      - run: uv run ruff check .
      - name: Type check (non-blocking)
        run: uv run ty check src
        continue-on-error: true
      - run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv build

  # Bumps the version (via python-semantic-release, reading conventional
  # commits since the last tag), pushes the version/changelog commit and
  # tag, creates a GitHub release, and -- for a non-prerelease version --
  # publishes to PyPI. Runs after test+build so nothing broken gets tagged.
  release:
    needs: [test, build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Release
        id: release
        run: |
          BEFORE=$(git tag -l | sort)
          uv run --group release semantic-release version
          AFTER=$(git tag -l | sort)
          NEW_TAG=$(comm -13 <(echo "$BEFORE") <(echo "$AFTER") | head -1)
          if [ -n "$NEW_TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish to PyPI
        if: steps.release.outputs.released == 'true' && !contains(steps.release.outputs.version, '-rc.')
        run: |
          uv build
          uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
